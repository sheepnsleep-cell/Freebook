name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate signing keystore
      run: |
        keytool -genkeypair -v \
          -keystore ${{ github.workspace }}/freebook.keystore \
          -alias freebook \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android123 \
          -keypass android123 \
          -dname "CN=Freebook, OU=Freebook, O=Freebook, L=Unknown, ST=Unknown, C=US"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Zipalign APK
      run: |
        BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
        ${BUILD_TOOLS}zipalign -v -p 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          app/build/outputs/apk/release/app-release-aligned.apk

    - name: Sign APK with apksigner
      run: |
        BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
        ${BUILD_TOOLS}apksigner sign \
          --ks ${{ github.workspace }}/freebook.keystore \
          --ks-key-alias freebook \
          --ks-pass pass:android123 \
          --key-pass pass:android123 \
          --out app/build/outputs/apk/release/Freebook.apk \
          app/build/outputs/apk/release/app-release-aligned.apk

    - name: Verify APK signature
      run: |
        BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
        ${BUILD_TOOLS}apksigner verify --print-certs \
          app/build/outputs/apk/release/Freebook.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Freebook-apk
        path: app/build/outputs/apk/release/Freebook.apk
        retention-days: 30
