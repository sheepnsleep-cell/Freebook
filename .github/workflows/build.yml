name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate signing keystore
      run: |
        keytool -genkeypair -v \
          -keystore ${{ github.workspace }}/app/freebook.keystore \
          -alias freebook \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass freebook123 \
          -keypass freebook123 \
          -dname "CN=Freebook, OU=Freebook, O=Freebook, L=Unknown, ST=Unknown, C=US"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Signed APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: freebook123
        KEY_PASSWORD: freebook123
        KEY_ALIAS: freebook
        KEYSTORE_FILE: ${{ github.workspace }}/app/freebook.keystore

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Freebook-signed-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
